artifacts:
  home: /path/to/keep/ore/downloaded/artifacts
  distribute:
    app: /path/to/app
    bin: /path/to/bin
    custom: /path/to/app
    jarcli: /path/to/.jarcli

download:
  default:
    - name: just
      repo: casey/just
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^just-.*-x86_64-unknown-linux-musl.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: hugo
      repo: gohugoio/hugo
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^hugo_[^ew].*_Linux-64bit.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz


    - name: actionlint
      repo: rhysd/actionlint
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^actionlint_.*_linux_amd64.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: act
      repo: nektos/act
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^act_Linux_x86_64.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz


    - name: websocat
      repo: vi/websocat
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^websocat.x86_64-unknown-linux-musl$
      filenameStrategy: artifact-version

    - name: k6
      repo: grafana/k6
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^k6-v[^-]*-linux-amd64.tar.gz$

    - name: gomplate
      repo: hairyhenderson/gomplate
      assetMatcherQuery: gomplate_linux-amd64
      filenameStrategy: artifact-version

    - name: conda
      repo: conda/conda
      assetMatcherQuery: ^conda-[^-]*.tar.gz$

    - name: asciinema
      repo: asciinema/asciinema
      assetMatcherQuery: ^jq-linux-amd64$
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      filenameStrategy: artifact-version

    - name: golangci-lint
      repo: golangci/golangci-lint
      assetMatcherQuery: ^golangci-lint-[^-]*-linux-amd64.tar.gz$

    - name: goreleaser
      repo: goreleaser/goreleaser
      assetMatcherQuery: ^goreleaser_Linux_x86_64.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: pom-cli
      repo: andirady/pom-cli
      assetMatcherQuery: ^pomcli-.*-linux-x86_64.tar.gz$

    - name: istioctl
      repo: istio/istio
      assetMatcherQuery: ^istioctl-[^-]*-linux-amd64.tar.gz$

    - name: agg
      repo: asciinema/agg
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^agg-x86_64-unknown-linux-gnu$
      filenameStrategy: artifact-version

    - name: mq
      repo: harehare/mq
      versionCaptureQuery: .tag_name|sub("v(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^mq-x86_64-unknown-linux-gnu$
      filenameStrategy: artifact-version

    - name: kind
      repo: kubernetes-sigs/kind
      versionCaptureQuery: .name
      assetMatcherQuery: ^kind-linux-amd64$
      filenameStrategy: artifact-version

    - name: minikube
      repo: kubernetes/minikube
      versionCaptureQuery: .name
      assetMatcherQuery: ^minikube-linux-amd64$
      filenameStrategy: artifact-version

    - name: k3d
      repo: k3d-io/k3d
      versionCaptureQuery: .name
      assetMatcherQuery: ^k3d-linux-amd64$
      filenameStrategy: artifact-version

    - name: fzf
      repo: junegunn/fzf
      versionCaptureQuery: .name
      assetMatcherQuery: ^fzf-.*-linux_amd64.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: k0s
      repo: k0sproject/k0s
      versionCaptureQuery: .name
      assetMatcherQuery: ^k0s-v.*-amd64$
      filenameStrategy: artifact-version

    - name: kompose
      repo: kubernetes/kompose
      versionCaptureQuery: .name
      assetMatcherQuery: ^kompose-linux-amd64$
      filenameStrategy: artifact-version

    - name: cmctl
      repo: cert-manager/cmctl
      assetMatcherQuery: ^cmctl_linux_amd64$
      filenameStrategy: artifact-version

    - name: oc
      repo: okd-project/okd
      assetMatcherQuery: ^openshift-client-linux-\\d.*.tar.gz$

    - name: htmlq
      repo: mgdm/htmlq
      versionCaptureQuery: .tag_name
      assetMatcherQuery: ^htmlq-x86_64-linux.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: FlaUInspect
      repo: FlaUI/FlaUInspect
      versionCaptureQuery: .tag_name
      assetMatcherQuery: ^FlaUInspect_(.*).zip$

    - name: yr
      repo: VirusTotal/yara-x
      versionCaptureQuery: .tag_name
      assetMatcherQuery: ^yara-x-.*-x86_64-unknown-linux-gnu.gz$

    - name: mkcert
      repo: FiloSottile/mkcert
      assetMatcherQuery: ^mkcert-v[^-]*-linux-amd64$
      filenameStrategy: artifact-version

    - name: qlty
      repo: qltysh/qlty
      assetMatcherQuery: ^qlty-x86_64-unknown-linux-gnu.tar.xz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: MiniZincIDE
      repo: MiniZinc/MiniZincIDE
      assetMatcherQuery: ^MiniZincIDE-[^-]*-bundle-linux-x86_64.tgz$

    - name: qpdf
      repo: qpdf/qpdf
      assetMatcherQuery: ^qpdf-.*-bin-linux-x86_64.zip$

    - name: pandoc
      repo: jgm/pandoc
      assetMatcherQuery: ^pandoc-.*?-amd64.deb$

    - name: keycloak
      repo: keycloak/keycloak
      versionCaptureQuery: .name
      assetMatcherQuery: ^keycloak-[^-]*.tar.gz$

    - name: liquibase
      repo: liquibase/liquibase
      assetMatcherQuery: ^liquibase-[^-]*.tar.gz$

    - name: jq
      repo: jqlang/jq
      assetMatcherQuery: ^jq-linux-amd64$
      versionCaptureQuery: .tag_name|sub("jq-(?<v>.*)"; "\(.v)")
      filenameStrategy: artifact-version

    - name: yq
      repo: mikefarah/yq
      assetMatcherQuery: ^yq_linux_amd64$
      filenameStrategy: artifact-version

    - name: jacoco
      repo: jacoco/jacoco
      assetMatcherQuery: ^jacoco-.*.zip$
      filenameStrategy: artifact-version
      filenameExtension: .zip

    - name: wsl-vpnkit
      repo: sakai135/wsl-vpnkit
      assetMatcherQuery: ^wsl-vpnkit.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: protoc
      repo: protocolbuffers/protobuf
      assetMatcherQuery: ^protoc-.*-linux-x86_64.zip$

    - name: node_exporter
      repo: prometheus/node_exporter
      assetMatcherQuery: ^node_exporter-.*.linux-amd64.tar.gz$

    - name: kubepfm
      repo: flowerinthenight/kubepfm
      versionCaptureQuery: .name
      assetMatcherQuery: ^kubepfm.*_linux_amd64.tar.gz$

    - name: kubectl-slice
      repo: patrickdappollonio/kubectl-slice
      versionCaptureQuery: .name
      assetMatcherQuery: ^kubectl-slice_linux_x86_64.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: kubeconform
      repo: yannh/kubeconform
      versionCaptureQuery: .name
      assetMatcherQuery: ^kubeconform-linux-amd64.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: jv
      repo: santhosh-tekuri/jsonschema
      versionCaptureQuery: .tag_name
      assetMatcherQuery: ^jv-.*-linux-amd64.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: slim
      repo: slimtoolkit/slim
      versionCaptureQuery: .tag_name
      assetMatcherQuery: ^dist_linux.tar.gz$
      filenameStrategy: artifact-version
      filenameExtension: .tar.gz

    - name: h2
      repo: h2database/h2database
      versionCaptureQuery: .tag_name|sub("version-(?<v>.*)"; "\(.v)")
      assetMatcherQuery: ^h2-[0-9\\.]*.jar$
      filenameExtension: .zip

distribution:
  default:
    app:
      - name: hugo
        createDirectory: Y
      - name: just
        versionRegex: ^just-\(.*\).tar.gz$
        createDirectory: Y
      - name: actionlint
        versionRegex: ^actionlint-\(.*\).tar.gz$
        createDirectory: Y
      - name: act
        versionRegex: ^act-\(.*\).tar.gz$
        createDirectory: Y
      - name: goreleaser
        createDirectory: Y
      - name: golangci-lint
        versionRegex: ^golangci-lint-\(.*\)-linux-amd64.tar.gz$
      - name: pom-cli
        versionRegex: ^pomcli-\(.*\)-linux-x86_64.tar.gz$
      - name: MiniZincIDE
        versionRegex: ^MiniZincIDE-\([^-]*\)-bundle-linux-x86_64.tgz$
      - name: keycloak
      - name: liquibase
        createDirectory: Y
      - name: jv
        createDirectory: Y
        versionRegex: ^jv-v\(.*\).tar.gz$
      - name: slim
      - name: jacoco
        createDirectory: Y

    bin:
      - name: fzf
        versionRegex: ^fzf-\(.*\).tar.gz$
      - name: yr
        versionRegex: ^yara-x-\(.*\)-x86_64-unknown-linux-gnu.gz$
        extractMethod: tar
      - name: mq
        extractMethod: copy
        versionRegex: ^mq-\([^-]*\)$
      - name: gomplate
        versionRegex: ^gomplate-\(.*\)$
        extractMethod: copy
      - name: agg
        extractMethod: copy
        versionRegex: ^agg-\([^-]*\)$
      - name: kind
        extractMethod: copy
        versionRegex: ^kind-v\([^-]*\)$
      - name: k3d
        extractMethod: copy
        versionRegex: ^k3d-v\([^-]*\)$
      - name: k0s
        extractMethod: copy
        versionRegex: ^k0s-v\([^-]*\)$
      - name: cmctl
        extractMethod: copy
        versionRegex: ^cmctl-v\([^-]*\)$
      - name: minikube
        extractMethod: copy
        versionRegex: ^minikube-v\([^-]*\)$
      - name: kompose
        extractMethod: copy
        versionRegex: ^kompose-v\([^-]*\)$
      - name: websocat
        extractMethod: copy
        versionRegex: ^websocat-\([^-]*\)$
      - name: istioctl
        versionRegex: ^istioctl-\([^-]*\)-linux-amd64.tar.gz$
      - name: oc
        versionRegex: ^openshift-client-linux-\(.*\).tar.gz$
      - name: htmlq
      - name: mkcert
        extractMethod: copy
        versionRegex: ^mkcert-v\([^-]*\)$
      - name: protoc
        versionRegex: ^protoc-\([^-]*\)-linux-x86_64.zip$
      - name: kubectl-slice
        versionRegex: ^kubectl-slice-v\([^-]*\).tar.gz$
      - name: kubeconform
      - name: kubepfm
        versionRegex: ^kubepfm_\([^-]*\)_linux_amd64.tar.gz$
      - name: node_exporter
        versionRegex: ^node_exporter-\([^-]*\).linux-amd64.tar.gz$
      - name: yq
        extractMethod: copy
        versionRegex: ^yq-\([^-]*\)$
      - name: jq
        extractMethod: copy
        versionRegex: ^jq-\([^-]*\)$

    custom:
      - name: k6
        versionRegex: ^k6-v\(.*\).tar.gz$
        script: k6
      - name: wsl-vpnkit
        versionRegex: ^wsl-vpnkit-v\(.*\).tar.gz$
      - name: qlty
        versionRegex: ^qlty-v\(.*\).tar.gz$
        script: qlty

    jarcli:
      - name: h2
        clis:
          - class: org.h2.tools.Server
            cli: h2-server
          - class: org.h2.tools.Shell
            cli: h2-shell

